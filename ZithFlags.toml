# ZithFlags.toml — built-in default configuration for the Zith compiler
# Used when ZithProject.toml is not available in the user's project.
# Individual CLI flags override these values.

mode = "debug"
opt_level = 0
debug_level = 2
edition = "2024"
verbose = false
strict = false
strip_debug = false
lto = false
color = "auto"

# Default include dirs (compiler stdlib path)
include_dirs = []
lib_paths = []

# Default emit target (empty = full pipeline to binary)
emit_target = ""
