<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 134 134" style="">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.06"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" style="stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Border circle -->
  <circle cx="64" cy="64" r="60" fill="none" stroke="#b4b8c1" stroke-width="1.5" style="fill:none;stroke:rgb(180, 184, 193);color:rgb(251, 251, 254);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Top-left corner accent lines -->
  <line x1="22" y1="22" x2="38" y2="22" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(249, 115, 22);color:rgb(251, 251, 254);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="22" y1="22" x2="22" y2="38" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(6, 182, 212);color:rgb(251, 251, 254);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Bottom-right corner accent lines -->
  <line x1="106" y1="106" x2="90" y2="106" stroke="#f97316" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(249, 115, 22);color:rgb(251, 251, 254);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <line x1="106" y1="106" x2="106" y2="90" stroke="#06b6d4" stroke-width="2.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(6, 182, 212);color:rgb(251, 251, 254);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Main letter Z in soft cyan -->
  <text x="64" y="74" font-family="Arial, Helvetica, sans-serif" font-size="68" font-weight="700" text-anchor="middle" fill="#06b6d4" letter-spacing="-2" style="fill:rgb(6, 182, 212);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, Helvetica, sans-serif;font-size:68px;font-weight:700;text-anchor:middle;dominant-baseline:auto">Z</text>

  <!-- Small letter t in orange -->
  <text x="96" y="68" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="600" text-anchor="start" fill="#f97316" style="fill:rgb(249, 115, 22);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Arial, Helvetica, sans-serif;font-size:32px;font-weight:600;text-anchor:start;dominant-baseline:auto">t</text>

  <!-- Divider line -->
  <line x1="28" y1="93" x2="100" y2="93" stroke="#d4d8df" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgb(212, 216, 223);color:rgb(251, 251, 254);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Element identifier "Zith" at bottom -->
  <text x="64" y="110" font-family="'Trebuchet MS', 'Courier New', monospace" font-size="12" font-weight="600" text-anchor="middle" fill="#6b7280" letter-spacing="0.5" style="fill:rgb(107, 114, 128);stroke:none;color:rgb(251, 251, 254);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Trebuchet MS&quot;, &quot;Courier New&quot;, monospace;font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:auto">ZITH</text>
</svg>
