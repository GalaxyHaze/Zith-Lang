name: Update Scoop Manifest

on:
  workflow_run:
    workflows: ["Build and Release (Clang Only)"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to update manifest for (e.g., v0.0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  update-scoop:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            # Get latest release tag from workflow_run trigger
            TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
          fi
          
          # Ensure tag starts with 'v'
          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="v$TAG"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release exists and is not draft
        run: |
          RELEASE_INFO=$(gh release view ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} \
            --json isDraft,isPrerelease,name)
          
          IS_DRAFT=$(echo "$RELEASE_INFO" | jq '.isDraft')
          
          if [ "$IS_DRAFT" = "true" ]; then
            echo "⚠️ Release is still in draft mode. Waiting for it to be published..."
            exit 0
          fi
          
          echo "✅ Release ${{ steps.tag.outputs.tag }} found and published"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release binaries
        id: download
        run: |
          mkdir -p release-bins
          
          echo "📥 Downloading Windows binaries for ${{ steps.tag.outputs.tag }}..."
          
          gh release download ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern "zith-windows-amd64.exe" \
            --pattern "zith-windows-arm64.exe" \
            --dir release-bins
          
          # Verify downloads
          if [ ! -f "release-bins/zith-windows-amd64.exe" ]; then
            echo "❌ Failed to download zith-windows-amd64.exe"
            exit 1
          fi
          
          if [ ! -f "release-bins/zith-windows-arm64.exe" ]; then
            echo "❌ Failed to download zith-windows-arm64.exe"
            exit 1
          fi
          
          echo "✅ Binaries downloaded successfully"
          ls -lh release-bins/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          echo "🔐 Computing SHA256 hashes..."
          
          AMD64=$(sha256sum release-bins/zith-windows-amd64.exe | cut -d' ' -f1)
          ARM64=$(sha256sum release-bins/zith-windows-arm64.exe | cut -d' ' -f1)
          
          echo "amd64=$AMD64" >> $GITHUB_OUTPUT
          echo "arm64=$ARM64" >> $GITHUB_OUTPUT
          
          echo "AMD64: $AMD64"
          echo "ARM64: $ARM64"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Update scoop manifest
        id: update
        run: |
          echo "📝 Updating scoop manifest..."
          
          # Backup original
          cp .github/scoop/bucket/zith.json .github/scoop/bucket/zith.json.bak
          
          jq \
            --arg version "${{ steps.tag.outputs.version }}" \
            --arg amd64 "${{ steps.hashes.outputs.amd64 }}" \
            --arg arm64 "${{ steps.hashes.outputs.arm64 }}" \
            '
              .version = $version |
              .architecture["64bit"].hash = $amd64 |
              .architecture["64bit"].url = "https://github.com/GalaxyHaze/Zith/releases/download/v\($version)/zith-windows-amd64.exe" |
              .architecture.arm64.hash = $arm64 |
              .architecture.arm64.url = "https://github.com/GalaxyHaze/Zith/releases/download/v\($version)/zith-windows-arm64.exe"
            ' .github/scoop/bucket/zith.json.bak > .github/scoop/bucket/zith.json
          
          # Validate JSON
          if ! jq empty .github/scoop/bucket/zith.json 2>/dev/null; then
            echo "❌ Invalid JSON generated, restoring backup"
            cp .github/scoop/bucket/zith.json.bak .github/scoop/bucket/zith.json
            exit 1
          fi
          
          echo "✅ Manifest updated successfully"
          echo "Updated version: ${{ steps.tag.outputs.version }}"
          
          # Show diff
          echo ""
          echo "Changes:"
          diff -u .github/scoop/bucket/zith.json.bak .github/scoop/bucket/zith.json || true

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .github/scoop/bucket/zith.json
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "⚠️ No changes to commit"
          else
            git commit -m "chore: update scoop manifest to ${{ steps.tag.outputs.tag }}"
            git push
            echo "✅ Changes pushed to repository"
          fi

      - name: Clean up
        if: always()
        run: |
          rm -f .github/scoop/bucket/zith.json.bak
          rm -rf release-bins
