name: Create Release Tag and Page

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write

jobs:
  tag-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create or verify tag
        id: tag
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"  # remove leading 'v' if user included it

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — skipping creation, will update release page only."
            echo "tag_created=false" >> $GITHUB_OUTPUT
          else
            git tag -a "v$VERSION" -m "Release v$VERSION"
            git push origin "v$VERSION"
            echo "tag_created=true" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create or Update GitHub Release Page
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.tag.outputs.version }}
          name: Release v${{ steps.tag.outputs.version }}
          # allow_update: true updates if the release already exists
          # instead of failing with "already exists"
          draft: false
          prerelease: false
          body: |
            ## Changes in v${{ steps.tag.outputs.version }}

            ### Installation
            **Linux / macOS:**

            curl -fsSL https://raw.githubusercontent.com/GalaxyHaze/Zith/master/install.sh | bash

            **Linux / macOS (musl static):**

            curl -fsSL https://raw.githubusercontent.com/GalaxyHaze/Zith/master/install.sh | bash -s -- --musl

            **Windows:**
            irm https://raw.githubusercontent.com/GalaxyHaze/Zith/master/install.ps1 | iex

            **WebAssembly:**

            curl -fsSL https://raw.githubusercontent.com/GalaxyHaze/Zith/master/install-wasm.sh | bash

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Trigger Build & Release
    needs: tag-and-release
    uses:  ./.github/workflows/build-artifact.yml
    with:
      tag_name: v${{ inputs.version }}
    secrets: inherit
    permissions:
      contents: write
