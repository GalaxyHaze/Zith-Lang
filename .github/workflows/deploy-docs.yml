name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - docsaurus/**
      - docs-architecture.md
      - Zith-spec.md
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        working-directory: docsaurus
        run: npm ci

      - name: Build docs
        working-directory: docsaurus
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docsaurus/build
          keep_files: true