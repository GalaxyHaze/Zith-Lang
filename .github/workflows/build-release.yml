name: Build and Release (Clang Only)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: 'v0.0.1'
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - id: meta
        name: Resolve tag
        shell: bash
        run: |
          TAG="${{ inputs.tag_name || github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-main:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: zith-linux-amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_LINKER=ld.lld

          - os: ubuntu-latest
            target_name: zith-linux-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_LINKER=ld.lld
              -DCMAKE_C_COMPILER_TARGET=aarch64-unknown-linux-gnu
              -DCMAKE_CXX_COMPILER_TARGET=aarch64-unknown-linux-gnu
              -DCMAKE_SYSROOT=/usr/aarch64-linux-gnu
              -DCMAKE_CROSSCOMPILING=ON

          - os: macos-latest
            target_name: zith-macos-amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang
              -DCMAKE_CXX_COMPILER=$(brew --prefix llvm)/bin/clang++
              -DLLVM_DIR=$(brew --prefix llvm)/lib/cmake/llvm
              -DCMAKE_OSX_ARCHITECTURES=x86_64
              -DCMAKE_CROSSCOMPILING=ON

          - os: macos-latest
            target_name: zith-macos-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang
              -DCMAKE_CXX_COMPILER=$(brew --prefix llvm)/bin/clang++
              -DLLVM_DIR=$(brew --prefix llvm)/lib/cmake/llvm

          - os: windows-latest
            target_name: zith-windows-amd64.exe
            msvc_arch: amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl

          - os: windows-latest
            target_name: zith-windows-arm64.exe
            msvc_arch: amd64_arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DCMAKE_C_COMPILER_TARGET=arm64-pc-windows-msvc
              -DCMAKE_CXX_COMPILER_TARGET=arm64-pc-windows-msvc
              -DCMAKE_CROSSCOMPILING=ON

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross libc6-arm64-cross \
            binutils-aarch64-linux-gnu
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install ninja llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: choco install llvm ninja -y

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Verify Clang
        shell: bash
        run: |
          clang --version
          clang++ --version

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S scripts -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            ${{ matrix.cmake_flags }}

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/bin/zith.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/zith
            cp build/bin/zith "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-musl:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: zith-linux-amd64-musl
            target_triple: x86_64-linux-musl
            toolchain: x86_64-linux-musl-cross

          - target_name: zith-linux-arm64-musl
            target_triple: aarch64-linux-musl
            toolchain: aarch64-linux-musl-cross

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Install Clang and tools
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18 wget xz-utils
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld

      - name: Install musl sysroot
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if curl -fL --retry 5 --retry-delay 3 --connect-timeout 30 \
              "https://musl.cc/${{ matrix.toolchain }}.tgz" \
              -o "${{ matrix.toolchain }}.tgz"; then
              break
            fi
            echo "Download attempt $attempt failed, retrying..."
            rm -f "${{ matrix.toolchain }}.tgz"
            sleep 5
          done
          tar -xzf "${{ matrix.toolchain }}.tgz"

      - name: Configure CMake
        shell: bash
        run: |
          SYSROOT="$PWD/${{ matrix.toolchain }}/${{ matrix.target_triple }}"
          cmake -S scripts -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_TARGET=${{ matrix.target_triple }} \
            -DCMAKE_CXX_COMPILER_TARGET=${{ matrix.target_triple }} \
            -DCMAKE_SYSROOT="$SYSROOT" \
            -DCMAKE_EXE_LINKER_FLAGS="--sysroot=$SYSROOT -fuse-ld=lld -static" \
            -DCMAKE_CROSSCOMPILING=ON

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          chmod +x build/bin/zith
          cp build/bin/zith "artifacts/${{ matrix.target_name }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    needs: create-release
    name: Build zith-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 3.1.65

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '3.28.x'

      - name: Configure CMake
        shell: bash
        run: |
          emcmake cmake -S scripts -B build-wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON

      - name: Build
        shell: bash
        run: cmake --build build-wasm --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts wasm-staging
          [ -d build-wasm/bin ] && cp build-wasm/bin/* wasm-staging/ || true
          find build-wasm -maxdepth 1 -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.html' \) -exec cp {} wasm-staging/ \;
          cd wasm-staging && zip -r ../artifacts/zith-wasm.zip . && cd ..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-wasm.zip
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
