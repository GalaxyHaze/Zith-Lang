name: Build Artifact

concurrency:
  group: build-${{ github.ref_name }}
  cancel-in-progress: true

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: ''
      draft:
        description: 'Create release as draft'
        type: boolean
        default: true
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false
      draft:
        type: boolean
        required: false
        default: true

permissions:
  contents: write

env:
  CMAKE_VERSION: '3.28.x'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - id: meta
        name: Resolve tag and draft mode
        shell: bash
        run: |
          TAG="${{ inputs.tag_name || github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          DRAFT="${{ inputs.draft != '' && inputs.draft || github.event.inputs.draft || 'true' }}"
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-main:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: zithc-linux-amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_LINKER=ld.lld
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: ubuntu-latest
            target_name: zithc-linux-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: macos-latest
            target_name: zithc-macos-universal
            cmake_flags: >-
              -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang
              -DCMAKE_CXX_COMPILER=$(brew --prefix llvm)/bin/clang++
              -DLLVM_DIR=$(brew --prefix llvm)/lib/cmake/llvm
              "-DCMAKE_OSX_ARCHITECTURES=x86_64;arm64"
              -DZITH_ENABLE_FFI=OFF

          - os: windows-latest
            target_name: zithc-windows-amd64.exe
            msvc_arch: amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: windows-latest
            target_name: zithc-windows-arm64.exe
            msvc_arch: amd64_arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DCMAKE_C_COMPILER_TARGET=arm64-pc-windows-msvc
              -DCMAKE_CXX_COMPILER_TARGET=arm64-pc-windows-msvc
              -DCMAKE_CROSSCOMPILING=ON
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        if: runner.os != 'macOS'
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross libc6-arm64-cross \
            binutils-aarch64-linux-gnu libffi-dev
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install ninja llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: choco install llvm ninja -y

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Verify Clang
        shell: bash
        run: |
          clang --version
          clang++ --version

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            ${{ matrix.cmake_flags }}

      - name: Clean stale static libraries
        if: runner.os == 'macOS'
        shell: bash
        run: rm -f build/lib/*.a

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/bin/zithc.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/zithc
            cp build/bin/zithc "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: ${{ needs.create-release.outputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-musl:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: zithc-linux-amd64-musl
            pkgs: musl-tools
            cc: musl-gcc
            cxx: musl-g++

          - target_name: zithc-linux-arm64-musl
            pkgs: aarch64-linux-musl
            cc: aarch64-linux-musl-gcc
            cxx: aarch64-linux-musl-g++

    steps:
      - uses: actions/checkout@v4

      - name: Install musl cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target_name }}" = "zithc-linux-arm64-musl" ]; then
            curl -L https://musl.cc/aarch64-linux-musl-cross.tgz | sudo tar xz -C /opt
            echo "/opt/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"
          fi

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION='${{ needs.create-release.outputs.tag }}' \
            -DCMAKE_C_COMPILER=${{ matrix.cc }} \
            -DCMAKE_CXX_COMPILER=${{ matrix.cxx }} \
            -DCMAKE_EXE_LINKER_FLAGS='-static' \
            -DZITH_ENABLE_FFI=OFF \
            -DZITH_ENABLE_LLVM=OFF

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp build/bin/zithc artifacts/${{ matrix.target_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: ${{ needs.create-release.outputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    needs: create-release
    name: Build zithc-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 3.1.65

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Configure CMake
        shell: bash
        run: |
          emcmake cmake -S . -B build-wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON \
            -DZITH_IS_WASM=ON

      - name: Build
        shell: bash
        run: cmake --build build-wasm --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts wasm-staging
          [ -d build-wasm/bin ] && cp build-wasm/bin/* wasm-staging/ || true
          find build-wasm -maxdepth 1 -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.html' \) -exec cp {} wasm-staging/ \;
          cd wasm-staging && zip -r ../artifacts/zithc-wasm.zip . && cd ..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zithc-wasm.zip
          draft: ${{ needs.create-release.outputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
