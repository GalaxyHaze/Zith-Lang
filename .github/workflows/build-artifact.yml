name: Build Artifact

concurrency:
  group: build-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: ''
      draft:
        description: 'Create release as draft'
        type: boolean
        default: true
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false
      draft:
        type: boolean
        required: false
        default: true

permissions:
  contents: write

env:
  CMAKE_VERSION: '3.28.x'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - id: meta
        name: Resolve tag and draft mode
        shell: bash
        run: |
          TAG="${{ inputs.tag_name || github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          DRAFT="true"
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            if [ "${{ inputs.draft }}" = "true" ]; then DRAFT="true"; else DRAFT="false"; fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.draft }}" = "true" ]; then DRAFT="true"; else DRAFT="false"; fi
          fi
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: github.event_name != 'workflow_call'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-main:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: zithc-linux-amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_LINKER=ld.lld
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: ubuntu-latest
            target_name: zithc-linux-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: macos-14
            target_name: zithc-macos-universal
            cmake_flags: >-
              -DCMAKE_C_COMPILER=$(xcrun -f clang)
              -DCMAKE_CXX_COMPILER=$(xcrun -f clang++)
              -DCMAKE_OSX_ARCHITECTURES="x86_64;arm64"
              -DCMAKE_AR=$(xcrun -f ar)
              -DCMAKE_RANLIB=$(xcrun -f ranlib)
              -DZITH_ENABLE_FFI=OFF

          - os: windows-latest
            target_name: zithc-windows-amd64.exe
            msvc_arch: amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: windows-latest
            target_name: zithc-windows-arm64.exe
            msvc_arch: amd64_arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross libc6-arm64-cross \
            binutils-aarch64-linux-gnu libffi-dev
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install ninja

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: choco install llvm ninja -y

      - name: Add Chocolatey LLVM to PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files/LLVM/bin" >> "$GITHUB_PATH"

      - name: Setup MSVC environment
        if: runner.os == 'Windows' && matrix.msvc_arch != ''
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup Zig (for Windows arm64 cross-compile)
        if: runner.os == 'Windows' && matrix.msvc_arch == ''
        shell: bash
        run: |
          ZIG_VER=$(curl -sL https://ziglang.org/download/index.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); v=[k for k in d if k[0].isdigit()]; v.sort(); print(v[-1])")
          curl -sL "https://ziglang.org/download/$ZIG_VER/zig-windows-x86_64-$ZIG_VER.zip" \
            -o /tmp/zig.zip
          unzip -q /tmp/zig.zip -d /opt
          echo "/opt/zig-windows-x86_64-$ZIG_VER" >> "$GITHUB_PATH"
          zig version

      - name: Verify Clang
        shell: bash
        run: |
          clang --version
          clang++ --version

      - name: Clean stale build artifacts
        shell: bash
        run: rm -rf build

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag || inputs.tag_name }} \
            ${{ matrix.cmake_flags }}

      - name: Clean stale macOS archives (prevent corruption)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rm -f build/lib/*.a build/*.a 2>/dev/null || true

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/zithc.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/zithc
            cp build/zithc "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag || inputs.tag_name }}
          files: artifacts/${{ matrix.target_name }}
          draft: ${{ needs.create-release.outputs.draft || inputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-musl:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: zithc-linux-amd64-musl
            zig_target: x86_64-linux-musl

          - target_name: zithc-linux-arm64-musl
            zig_target: aarch64-linux-musl

    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        shell: bash
        run: |
          ZIG_VER=$(curl -sL https://ziglang.org/download/index.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); v=[k for k in d if k[0].isdigit()]; v.sort(); print(v[-1])")
          curl -sL "https://ziglang.org/download/$ZIG_VER/zig-linux-x86_64-$ZIG_VER.tar.xz" \
            | sudo tar xJ -C /opt
          sudo ln -sf /opt/zig-linux-x86_64-$ZIG_VER/zig /usr/local/bin/zig
          zig version

      - name: Build
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION='${{ needs.create-release.outputs.tag || inputs.tag_name }}' \
            -DCMAKE_C_COMPILER="zig;cc;-target;${{ matrix.zig_target }}" \
            -DCMAKE_CXX_COMPILER="zig;c++;-target;${{ matrix.zig_target }}" \
            -DZITH_ENABLE_FFI=OFF \
            -DCMAKE_EXE_LINKER_FLAGS='-static -lc' \
            -DCMAKE_CXX_FLAGS='-fno-cxx-exceptions'
          cmake --build build --config Release
          mkdir -p artifacts
          cp build/zithc artifacts/${{ matrix.target_name }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag || inputs.tag_name }}
          files: artifacts/${{ matrix.target_name }}
          draft: ${{ needs.create-release.outputs.draft || inputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-stdlib:
    needs: create-release
    name: Package stdlib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create stdlib archives
        shell: bash
        run: |
          mkdir -p artifacts
          TAG="${{ needs.create-release.outputs.tag || inputs.tag_name }}"
          cd stdlib
          tar czf "../artifacts/zithc-stdlib-${TAG}.tar.gz" .
          zip -r "../artifacts/zithc-stdlib-${TAG}.zip" .
          cd ..

      - name: Upload stdlib release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag || inputs.tag_name }}
          files: artifacts/zithc-stdlib-*
          draft: ${{ needs.create-release.outputs.draft || inputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-lsp:
    needs: create-release
    name: Build zith-lsp-${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_LINKER=ld.lld

          - os: ubuntu-latest
            target_name: linux-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64

          - os: macos-14
            target_name: macos-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=$(xcrun -f clang)
              -DCMAKE_CXX_COMPILER=$(xcrun -f clang++)
              -DCMAKE_OSX_ARCHITECTURES=arm64
              -DCMAKE_AR=$(xcrun -f ar)
              -DCMAKE_RANLIB=$(xcrun -f ranlib)
              -DZITH_ENABLE_FFI=OFF

          - os: windows-latest
            target_name: windows-amd64.exe
            msvc_arch: amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DZITH_ENABLE_FFI=OFF

          - os: windows-latest
            target_name: windows-arm64.exe
            msvc_arch: amd64_arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DZITH_ENABLE_FFI=OFF

    steps:
      - name: Checkout zith-lsp
        uses: actions/checkout@v4
        with:
          repository: GalaxyHaze/zith-lsp
          ref: main
          token: ${{ secrets.GH_PAT }}
          path: lsp

      - name: Checkout Zith (local for ZITHC_SOURCE_DIR)
        uses: actions/checkout@v4
        with:
          path: zithc-src

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross libc6-arm64-cross \
            binutils-aarch64-linux-gnu libffi-dev
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install ninja

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: choco install llvm ninja -y

      - name: Add Chocolatey LLVM to PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files/LLVM/bin" >> "$GITHUB_PATH"

      - name: Setup MSVC environment
        if: runner.os == 'Windows' && matrix.msvc_arch != ''
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Setup Zig (for Windows arm64 cross-compile)
        if: runner.os == 'Windows' && matrix.msvc_arch == ''
        shell: bash
        run: |
          ZIG_VER=$(curl -sL https://ziglang.org/download/index.json \
            | python3 -c "import sys,json; d=json.load(sys.stdin); v=[k for k in d if k[0].isdigit()]; v.sort(); print(v[-1])")
          curl -sL "https://ziglang.org/download/$ZIG_VER/zig-windows-x86_64-$ZIG_VER.zip" \
            -o /tmp/zig.zip
          unzip -q /tmp/zig.zip -d /opt
          echo "/opt/zig-windows-x86_64-$ZIG_VER" >> "$GITHUB_PATH"
          zig version

      - name: Clean stale build artifacts
        shell: bash
        working-directory: lsp
        run: rm -rf build

      - name: Configure zith-lsp
        shell: bash
        working-directory: lsp
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DZITHC_SOURCE_DIR=${{ github.workspace }}/zithc-src \
            ${{ matrix.cmake_flags }}

      - name: Build zith-lsp
        shell: bash
        working-directory: lsp
        run: cmake --build build --config Release -j"$(nproc)"

      - name: Run tests (Linux amd64 only)
        if: matrix.target_name == 'linux-amd64'
        shell: bash
        working-directory: lsp
        run: |
          cd tests
          python3 -m unittest test_lsp -v

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp lsp/build/zith-lsp.exe "artifacts/zith-lsp-${{ matrix.target_name }}"
          else
            chmod +x lsp/build/zith-lsp
            cp lsp/build/zith-lsp "artifacts/zith-lsp-${{ matrix.target_name }}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag || inputs.tag_name }}
          files: artifacts/zith-lsp-*
          draft: ${{ needs.create-release.outputs.draft || inputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    needs: create-release
    name: Build zithc-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 3.1.65

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build-wasm
          key: cmake-wasm-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*.cpp', 'src/**/*.hpp') }}
          restore-keys: |
            cmake-wasm-

      - name: Configure CMake
        shell: bash
        run: |
          rm -f build-wasm/CMakeCache.txt build-wasm/CMakeFiles -rf 2>/dev/null || true
          emcmake cmake -S . -B build-wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag || inputs.tag_name }} \
            -DCMAKE_CROSSCOMPILING=ON \
            -DZITH_IS_WASM=ON

      - name: Build
        shell: bash
        run: cmake --build build-wasm --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts wasm-staging
          [ -d build-wasm/bin ] && cp build-wasm/bin/* wasm-staging/ || true
          find build-wasm -maxdepth 1 -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.html' \) -exec cp {} wasm-staging/ \;
          cd wasm-staging && zip -r ../artifacts/zithc-wasm.zip . && cd ..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag || inputs.tag_name }}
          files: artifacts/zithc-wasm.zip
          draft: ${{ needs.create-release.outputs.draft || inputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
