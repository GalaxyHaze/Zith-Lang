name: Build Artifact

concurrency:
  group: build-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: true

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag para a Release (ex: v1.0.0)'
        required: false
        default: ''
      draft:
        description: 'Create release as draft'
        type: boolean
        default: true
  workflow_call:
    inputs:
      tag_name:
        type: string
        required: false
      draft:
        type: boolean
        required: false
        default: true

permissions:
  contents: write

env:
  CMAKE_VERSION: '3.28.x'

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      draft: ${{ steps.meta.outputs.draft }}
    steps:
      - id: meta
        name: Resolve tag and draft mode
        shell: bash
        run: |
          TAG="${{ inputs.tag_name || github.event.inputs.tag_name || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          DRAFT="true"
          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            if [ "${{ inputs.draft }}" = "true" ]; then DRAFT="true"; else DRAFT="false"; fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ github.event.inputs.draft }}" = "true" ]; then DRAFT="true"; else DRAFT="false"; fi
          fi
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: github.event_name != 'workflow_call'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          draft: ${{ steps.meta.outputs.draft }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-main:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: zith-linux-amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang
              -DCMAKE_CXX_COMPILER=clang++
              -DCMAKE_LINKER=ld.lld
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: ubuntu-latest
            target_name: zith-linux-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc
              -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
              -DCMAKE_SYSTEM_NAME=Linux
              -DCMAKE_SYSTEM_PROCESSOR=aarch64
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: macos-13
            target_name: zith-macos-amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang
              -DCMAKE_CXX_COMPILER=$(brew --prefix llvm)/bin/clang++
              -DLLVM_DIR=$(brew --prefix llvm)/lib/cmake/llvm
              -DCMAKE_OSX_ARCHITECTURES=x86_64
              -DZITH_ENABLE_FFI=OFF

          - os: macos-14
            target_name: zith-macos-arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=$(brew --prefix llvm)/bin/clang
              -DCMAKE_CXX_COMPILER=$(brew --prefix llvm)/bin/clang++
              -DLLVM_DIR=$(brew --prefix llvm)/lib/cmake/llvm
              -DCMAKE_OSX_ARCHITECTURES=arm64
              -DZITH_ENABLE_FFI=OFF

          - os: windows-latest
            target_name: zith-windows-amd64.exe
            msvc_arch: amd64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

          - os: windows-latest
            target_name: zith-windows-arm64.exe
            msvc_arch: amd64_arm64
            cmake_flags: >-
              -DCMAKE_C_COMPILER=clang-cl
              -DCMAKE_CXX_COMPILER=clang-cl
              -DCMAKE_C_COMPILER_TARGET=arm64-pc-windows-msvc
              -DCMAKE_CXX_COMPILER_TARGET=arm64-pc-windows-msvc
              -DCMAKE_CROSSCOMPILING=ON
              -DZITH_ENABLE_FFI=OFF
              -DZITH_ENABLE_LLVM=OFF

    steps:
      - uses: actions/checkout@v4

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build clang-18 lld-18 \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            libc6-dev-arm64-cross libc6-arm64-cross \
            binutils-aarch64-linux-gnu libffi-dev
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          sudo ln -sf /usr/bin/ld.lld-18 /usr/bin/ld.lld

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          brew install ninja llvm
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: bash
        run: choco install llvm ninja -y

      - name: Setup MSVC environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Verify Clang
        shell: bash
        run: |
          clang --version
          clang++ --version

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: cmake-${{ matrix.target_name }}-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*.cpp', 'src/**/*.hpp', 'include/**/*.hpp') }}
          restore-keys: |
            cmake-${{ matrix.target_name }}-
            cmake-

      - name: Configure CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            ${{ matrix.cmake_flags }}

      - name: Clean stale macOS archives (prevent corruption)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          rm -f build/lib/*.a 2>/dev/null || true
          rm -f build/bin/* 2>/dev/null || true

      - name: Build
        shell: bash
        run: cmake --build build --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp build/bin/zith.exe "artifacts/${{ matrix.target_name }}"
          else
            chmod +x build/bin/zith
            cp build/bin/zith "artifacts/${{ matrix.target_name }}"
          fi

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: ${{ needs.create-release.outputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-musl:
    needs: create-release
    name: Build ${{ matrix.target_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target_name: zith-linux-amd64-musl
            platform: linux/amd64

          - target_name: zith-linux-arm64-musl
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for arm64)
        if: matrix.target_name == 'zith-linux-arm64-musl'
        uses: docker/setup-qemu-action@v3

      - name: Build inside Alpine container
        shell: bash
        run: |
          docker run --rm --platform "${{ matrix.platform }}" \
            -v "$PWD:/work" -w /work alpine:3.23 sh -c "
              apk add --no-cache clang cmake ninja musl-dev linux-headers git
              cmake -S . -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTING=OFF \
                -DENABLE_WERROR=OFF \
                -DZITH_VERSION='${{ needs.create-release.outputs.tag }}' \
                -DCMAKE_C_COMPILER=clang \
                -DCMAKE_CXX_COMPILER=clang++ \
                -DCMAKE_CROSSCOMPILING=OFF \
                -DZITH_ENABLE_FFI=OFF \
                -DZITH_ENABLE_LLVM=OFF \
                -DCMAKE_EXE_LINKER_FLAGS='-static'
              cmake --build build --config Release
              mkdir -p artifacts
              cp build/bin/zith artifacts/${{ matrix.target_name }}
            "

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/${{ matrix.target_name }}
          draft: ${{ needs.create-release.outputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-wasm:
    needs: create-release
    name: Build zith-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 3.1.65

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: ${{ env.CMAKE_VERSION }}

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build-wasm
          key: cmake-wasm-${{ hashFiles('CMakeLists.txt', 'cmake/**/*.cmake', 'src/**/*.cpp', 'src/**/*.hpp', 'include/**/*.hpp') }}
          restore-keys: |
            cmake-wasm-

      - name: Configure CMake
        shell: bash
        run: |
          emcmake cmake -S . -B build-wasm -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DENABLE_WERROR=OFF \
            -DZITH_VERSION=${{ needs.create-release.outputs.tag }} \
            -DCMAKE_CROSSCOMPILING=ON \
            -DZITH_IS_WASM=ON

      - name: Build
        shell: bash
        run: cmake --build build-wasm --config Release

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts wasm-staging
          [ -d build-wasm/bin ] && cp build-wasm/bin/* wasm-staging/ || true
          find build-wasm -maxdepth 1 -type f \( -name '*.wasm' -o -name '*.js' -o -name '*.html' \) -exec cp {} wasm-staging/ \;
          cd wasm-staging && zip -r ../artifacts/zith-wasm.zip . && cd ..

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: artifacts/zith-wasm.zip
          draft: ${{ needs.create-release.outputs.draft }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
