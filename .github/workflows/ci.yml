name: CI

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ pkg-config

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure

  cross-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Setup Zig
        run: |
          ZIG_VER="0.13.0"
          curl -sL "https://ziglang.org/download/$ZIG_VER/zig-linux-x86_64-$ZIG_VER.tar.xz" | tar -xJ -C /tmp
          echo "/tmp/zig-linux-x86_64-$ZIG_VER" >> $GITHUB_PATH

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: 3.1.65

      - name: Configure and Build MUSL (Static)
        env:
          ZIG_GLOBAL_CACHE_DIR: /tmp/zig-global-cache
          ZIG_LOCAL_CACHE_DIR: /tmp/zig-local-cache
        run: |
          mkdir -p /tmp/zig-global-cache /tmp/zig-local-cache
          cmake -S . -B build-musl \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_C_COMPILER="zig;cc" \
            -DCMAKE_CXX_COMPILER="zig;c++" \
            -DCMAKE_C_COMPILER_TARGET="x86_64-linux-musl" \
            -DCMAKE_CXX_COMPILER_TARGET="x86_64-linux-musl" \
            -DZITH_ENABLE_FFI=OFF \
            -DZITH_HAS_LLVM=OFF \
            -DCMAKE_EXE_LINKER_FLAGS='-static -lc' \
            -DCMAKE_CXX_FLAGS='-fno-cxx-exceptions'
          cmake --build build-musl -j$(nproc)

      - name: Configure and Build WebAssembly
        run: |
          emcmake cmake -S . -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DCMAKE_CROSSCOMPILING=ON \
            -DZITH_IS_WASM=ON
          cmake --build build-wasm -j$(nproc)
