name: Update Packages Manifest

on:
  workflow_run:
    workflows: ["Build Artifact"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to update manifest for (e.g., v0.0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  update-scoop:
    if: |
      github.event_name == 'workflow_dispatch' || 
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            # Get latest release tag from workflow_run trigger
            TAG=$(gh release list --repo ${{ github.repository }} --limit 1 --json tagName -q '.[0].tagName')
          fi
          
          # Ensure tag starts with 'v'
          if [[ ! "$TAG" =~ ^v ]]; then
            TAG="v$TAG"
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release binaries
        id: download
        run: |
          mkdir -p release-bins
          
          gh release download ${{ steps.tag.outputs.tag }} \
            --repo ${{ github.repository }} \
            --pattern "zith-windows-amd64.exe" \
            --pattern "zith-windows-arm64.exe" \
            --dir release-bins
          
          if [ ! -f "release-bins/zith-windows-amd64.exe" ]; then
            echo "âťŚ Failed to download zith-windows-amd64.exe"
            exit 1
          fi
          
          if [ ! -f "release-bins/zith-windows-arm64.exe" ]; then
            echo "âťŚ Failed to download zith-windows-arm64.exe"
            exit 1
          fi
          
          ls -lh release-bins/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 hashes
        id: hashes
        run: |
          AMD64=$(sha256sum release-bins/zith-windows-amd64.exe | cut -d' ' -f1)
          ARM64=$(sha256sum release-bins/zith-windows-arm64.exe | cut -d' ' -f1)
          echo "amd64=$AMD64" >> $GITHUB_OUTPUT
          echo "arm64=$ARM64" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Update scoop manifest
        run: |
          cp .github/scoop/bucket/zith.json .github/scoop/bucket/zith.json.bak
          
          jq \
            --arg version "${{ steps.tag.outputs.version }}" \
            --arg amd64 "${{ steps.hashes.outputs.amd64 }}" \
            --arg arm64 "${{ steps.hashes.outputs.arm64 }}" \
            '
              .version = $version |
              .architecture["64bit"].hash = $amd64 |
              .architecture["64bit"].url = "https://github.com/GalaxyHaze/Zith/releases/download/v\($version)/zith-windows-amd64.exe" |
              .architecture.arm64.hash = $arm64 |
              .architecture.arm64.url = "https://github.com/GalaxyHaze/Zith/releases/download/v\($version)/zith-windows-arm64.exe"
            ' .github/scoop/bucket/zith.json.bak > .github/scoop/bucket/zith.json
          
          if ! jq empty .github/scoop/bucket/zith.json 2>/dev/null; then
            cp .github/scoop/bucket/zith.json.bak .github/scoop/bucket/zith.json
            exit 1
          fi
          
          rm -f .github/scoop/bucket/zith.json.bak

      - name: Commit scoop changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/scoop/bucket/zith.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update scoop manifest to ${{ steps.tag.outputs.tag }}"
            git push
          fi

      - name: Compute brew source SHA256
        id: brew
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          echo "url=$URL" >> $GITHUB_OUTPUT
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "sha256=$SHA" >> $GITHUB_OUTPUT

      - name: Trigger homebrew update
        run: |
          gh api repos/GalaxyHaze/homebrew-zith/dispatches \
            --method POST \
            --field event_type=new-release \
            --field client_payload="{\"version\":\"${{ steps.brew.outputs.version }}\",\"url\":\"${{ steps.brew.outputs.url }}\",\"sha256\":\"${{ steps.brew.outputs.sha256 }}\"}"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Clean up
        if: always()
        run: rm -rf release-bins
